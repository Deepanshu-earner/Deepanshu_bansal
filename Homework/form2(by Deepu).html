<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>form 2</title>
  </head>
  <body>
    <h1 style="text-align: center">Pete's Pizza Delivery</h1>
    <h2 style="text-align: center">Online order Form</h2>
    <p style="text-align: center">* required fields</p>

    <form action="welcome.html">
      <fieldset>
        <legend>Customer Details</legend>

        <table>
          <tr>
            <td><label for="name">*Name:</label></td>
            <td><input type="text" id="name" required /></td>
          </tr>

          <tr>
            <td><label for="Address">*Address:</label></td>
            <td><input type="text" id="Address" size="50" required /></td>
          </tr>

          <tr>
            <td><label for="city">*Town/city:</label></td>
            <td><input type="text" id="city" size="15" required /></td>
          </tr>

          <tr>
            <td><label for="Postcode">*Postcode:</label></td>
            <td><input type="number" id="Postcode" min="0" required /></td>
          </tr>

          <tr>
            <td><label for="Tel">*Tel:</label></td>
            <td><input type="number" id="Tel" min="0" required /></td>
          </tr>

          <tr>
            <td><label for="Email">*Email:</label></td>
            <td><input type="email" id="Email" size="50" required /></td>
          </tr>
        </table>
      </fieldset>
      <div>

        <fieldset style="display:inline-block; vertical-align:top; width:200px; height:100px;">
            <legend>Toppings *</legend>
    
            <input type="radio" id="M" name="topping" value="Margherita">
            <label for="M">Margherita</label><br>
    
            <input type="radio" id="F" name="topping" value="Four Seasons">
            <label for="F">Four Seasons</label><br>
    
            <input type="radio" id="meat" name="topping" value="Meat Feast">
            <label for="meat">Meat Feast</label>
        </fieldset>
    
    
        <fieldset style="display:inline-block; vertical-align:top; width:200px; height:100px;">
            <legend>Size *</legend>
    
            <input type="radio" id="small" name="size" value="Small">
            <label for="small">Small</label><br>
    
            <input type="radio" id="Med" name="size" value="Medium">
            <label for="Med">Medium</label><br>
    
            <input type="radio" id="large" name="size" value="Large">
            <label for="large">Large</label>
        </fieldset>
    
    
        <fieldset style="display:inline-block; vertical-align:top; width:200px; height:100px;">
            <legend>Extras</legend>
    
            <input type="checkbox" id="Mushrooms" value="Mushrooms">
            <label for="Mushrooms">Mushrooms</label><br>
    
            <input type="checkbox" id="Green-peppers" value="Green peppers">
            <label for="Green-peppers">Green peppers</label><br>
    
            <input type="checkbox" id="Extra-cheese" value="Extra cheese">
            <label for="Extra-cheese">Extra cheese</label><br>
    
            <input type="checkbox" id="Anchovies" value="Anchovies">
            <label for="Anchovies">Anchovies</label>
    
        </fieldset>
    
    </div>

        <fieldset>
          <legend>Delivery</legend>
          <label for="time">Preferred Delivery time:</label>
          <input type="time" id="time" /><br /><br />

          <label>Delivery Instructions:</label><br />
          <textarea rows="4" cols="85"></textarea>
        </fieldset>
        <br />
        <div style="text-align: center">
          <button type="submit">Submit order</button>
        </div>
      </div>
    </form>
  </body>
</html>
