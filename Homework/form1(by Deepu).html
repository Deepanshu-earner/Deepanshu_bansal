<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form1</title>
  </head>

  <body>
    <h1 style="text-align: center">Novell Services Login</h1>

    <form action="welcome.html">
      <table>
        <tr>
          <td><label for="username">Username:</label></td>
          <td><input type="text" id="username" /></td>
        </tr>

        <tr>
          <td><label for="password">Password:</label></td>
          <td><input type="password" id="password" minlength="10" /></td>
        </tr>

        <tr>
          <td><label for="city">City of Employment:</label></td>
          <td><input type="text" id="city" /></td>
        </tr>

        <tr>
          <td><label for="Webserver">Web Server:</label></td>
          <td>
            <select id="Webserver">
              <option>Google</option>
              <option>Yahoo</option>
              <option>Brave</option>
            </select>
          </td>
        </tr>
        <tr>
          <td rowspan="5">Please specify your role:</td>
          <td></td>
        </tr>
        <tr>
          <td>
            <input type="radio" id="admin" name="role" />
            <label for="admin">Admin</label>
          </td>
        </tr>

        <tr>
          <td>
            <input type="radio" id="Engineer" name="role" />
            <label for="Engineer">Engineer</label>
          </td>
        </tr>

        <tr>
          <td>
            <input type="radio" id="Manager" name="role" />
            <label for="Manager">Manager</label>
          </td>
        </tr>

        <tr>
          <td>
            <input type="radio" id="Guest" name="role" />
            <label for="Guest">Guest</label>
          </td>
        </tr>

        <tr>
          <td rowspan="3">Single sign-On to the following:</td>
          <td>
            <input type="checkbox" id="Mail" />
            <label for="Mail">Mail</label>
          </td>
        </tr>

        <tr>
          <td>
            <input type="checkbox" id="Payroll" />
            <label for="Payroll">Payroll</label>
          </td>
        </tr>

        <tr>
          <td>
            <input type="checkbox" id="Self-service" />
            <label for="Self-service">Self-service</label>
          </td>
        </tr>

        <tr>
          <td colspan="2" align="center">
            <br />
            <button type="submit">Login</button>
            <button type="reset">Reset</button>
          </td>
        </tr>
      </table>
    </form>
  </body>
</html>
